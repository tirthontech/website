<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary Meta -->
    <title>Tirthon Tech | Custom Software, AI & Data Solutions</title>
    <meta name="description" content="Tirthon Tech is a US-based software company building custom web apps, mobile apps, AI solutions, Shopify apps, Windows software, and AI training datasets. Scalable. Fast. Built to grow." />
    <meta name="keywords" content="custom software development, web app development, mobile app development, AI solutions, data annotation, AI training data, Shopify app development, Windows software, cloud infrastructure, technology consulting, Tirthon Tech" />
    <meta name="author" content="Tirthon Tech" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://tirthontech.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tirthontech.com/" />
    <meta property="og:title" content="Tirthon Tech | Custom Software, AI & Data Solutions" />
    <meta property="og:description" content="We build custom web apps, mobile apps, AI tools, Shopify apps, and AI training datasets. US-based. Scalable. Built to grow." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tirthon Tech - Build. Automate. Scale." />
    <meta property="og:site_name" content="Tirthon Tech" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://tirthontech.com/" />
    <meta name="twitter:title" content="Tirthon Tech | Custom Software, AI & Data Solutions" />
    <meta name="twitter:description" content="We build custom web apps, mobile apps, AI tools, Shopify apps, and AI training datasets. US-based. Scalable. Built to grow." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <meta name="twitter:image:alt" content="Tirthon Tech - Build. Automate. Scale." />

    <!-- Theme & App -->
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#C8922A" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Tirthon Tech",
      "url": "https://tirthontech.com",
      "logo": "https://tirthontech.com/logo.png",
      "description": "US-based software development company specializing in custom web apps, mobile apps, AI solutions, data annotation, Shopify apps, and Windows software.",
      "email": "tirthontech@gmail.com",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "US"
      },
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "tirthontech@gmail.com",
        "availableLanguage": "English"
      },
      "offers": [
        { "@type": "Offer", "name": "Custom Software Development" },
        { "@type": "Offer", "name": "Web & Mobile App Development" },
        { "@type": "Offer", "name": "AI & Automation Solutions" },
        { "@type": "Offer", "name": "Data for AI Training" },
        { "@type": "Offer", "name": "Data Annotation" },
        { "@type": "Offer", "name": "Shopify App Development" },
        { "@type": "Offer", "name": "Windows Software Development" },
        { "@type": "Offer", "name": "Technology Consulting" }
      ]
    }
    </script>

    <!-- JSON-LD Structured Data: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tirthon Tech",
      "url": "https://tirthontech.com"
    }
    </script>
  </head>
  <body>
    <!-- Hidden form for Netlify Forms detection -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <textarea name="message"></textarea>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
