      "foundingDate": "2024",
      "email": "business@tirthontech.com",
      "telephone": "+91-94245-75918",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "B56, Tilak Nagar",

        "addressRegion": "Madhya Pradesh",

        "https://www.linkedin.com/company/113329677/",
        "https://www.instagram.com/tirthon_tech/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",

        "telephone": "+91-94245-75918",

    <!-- JSON-LD Structured Data: WebSite with Sitelinks Searchbox -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Tirthon Tech",
      "url": "https://tirthontech.com/",
      "description": "Custom software development company specializing in web apps, mobile apps, AI solutions, data annotation, and Shopify development.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://tirthontech.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  <body>

    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <textarea name="message"></textarea>
    </form>
